<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E45;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DBE7A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Modern House Key Icon -->
  <g transform="translate(60, 60)">
    <!-- House outline -->
    <path d="M -20 5 L -20 20 L 20 20 L 20 5 L 0 -15 Z" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Door -->
    <rect x="-6" y="8" width="12" height="12" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Door knob -->
    <circle cx="6" cy="14" r="1.5" fill="url(#grad1)"/>
    
    <!-- Window -->
    <rect x="-16" y="0" width="8" height="8" fill="none" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-12" y1="0" x2="-12" y2="8" stroke="url(#grad1)" stroke-width="1"/>
    <line x1="-16" y1="4" x2="-8" y2="4" stroke="url(#grad1)" stroke-width="1"/>
    
    <!-- Key shaft extending right -->
    <line x1="20" y1="14" x2="32" y2="14" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Key head (circle) -->
    <circle cx="35" cy="14" r="5" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
    
    <!-- Key teeth -->
    <rect x="32.5" y="18" width="2" height="2.5" fill="url(#grad1)"/>
    <rect x="37" y="18" width="2" height="2.5" fill="url(#grad1)"/>
  </g>
</svg>